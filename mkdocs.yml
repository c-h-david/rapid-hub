site_name: RAPID
site_description: Routing Application for Parallel computatIon of Discharge - Advanced River Network Modeling
site_url: https://c-h-david.github.io/rapid-hub
site_author: RAPID Development Team

nav:
  - Home: index.md
  - User Guide:
      - Quick Start: user-guide/quick-start-sandbox.md
      - Understanding Files: user-guide/understanding-files.md
      - Migrating to RAPID2: user-guide/migrating-to-rapid2.md

theme:
  name: material
  logo: imgs/icon_rapid_network.svg
  favicon: imgs/icon_rapid_network.svg
  palette:
    - scheme: default
      primary: light blue
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: light blue
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - js/mermaid.min.js
  - js/mermaid-init.js

extra:
  rapid_repo: https://github.com/c-h-david/rapid2
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/c-h-david/rapid2
      name: RAPID on GitHub
    - icon: fontawesome/solid/globe
      link: http://rapid-hub.org/index.html
      name: Documentation

plugins:
  - search:
      lang: en
  - macros
  - mkdocs-jupyter:
      execute: false
      include_source: true

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true
